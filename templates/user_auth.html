<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | InsightStream AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .bg-navy-950 { background-color: #020617; }
        
        .glass-auth-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .glass-auth-card::-webkit-scrollbar { width: 6px; }
        .glass-auth-card::-webkit-scrollbar-track { background: transparent; }
        .glass-auth-card::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .input-style {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-style:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            outline: none;
        }
    </style>
</head>

<body class="bg-navy-950 text-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md glass-auth-card rounded-3xl p-8 md:p-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 mb-4 border border-indigo-500/30">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-10 h-10 object-contain">
            </div>
            <h1 id="auth-title" class="text-3xl font-extrabold text-white tracking-tight">Welcome Back</h1>
            <p id="auth-subtitle" class="text-slate-400 mt-2">Please sign in to your business account</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-xl text-sm {% if category == 'error' %} bg-red-500/10 text-red-400 border border-red-500/20 {% else %} bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div id="login-section">
            <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full input-style rounded-xl px-4 py-3 text-white placeholder-slate-500" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" name="password" required class="w-full input-style rounded-xl px-4 py-3 text-white placeholder-slate-500" placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] shadow-lg shadow-indigo-600/20">
                    Sign In
                </button>
            </form>
        </div>

        <div id="register-section" class="hidden">
            <form action="{{ url_for('register') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Business Name</label>
                    <input type="text" name="business_name" required class="w-full input-style rounded-xl px-4 py-3 text-white placeholder-slate-500" placeholder="Acme Corp">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Work Email</label>
                    <input type="email" name="email" required class="w-full input-style rounded-xl px-4 py-3 text-white placeholder-slate-500" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
                    <input type="tel" name="phone" required class="w-full input-style rounded-xl px-4 py-3 text-white placeholder-slate-500" placeholder="+1 (555) 000-0000">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Create Password</label>
                    <input type="password" name="password" required class="w-full input-style rounded-xl px-4 py-3 text-white placeholder-slate-500" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all duration-300 shadow-lg shadow-indigo-600/20">
                    Create Account
                </button>
            </form>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-slate-400 text-sm">
                <span id="toggle-text">Don't have an account?</span>
                <button id="toggle-btn" class="text-indigo-400 font-semibold hover:text-indigo-300 ml-1">Create Account</button>
            </p>
        </div>
    </div>

    <script>
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');
        const toggleBtn = document.getElementById('toggle-btn');
        const toggleText = document.getElementById('toggle-text');

        toggleBtn.addEventListener('click', () => {
            if (registerSection.classList.contains('hidden')) {
                // Switch to Register
                loginSection.classList.add('hidden');
                registerSection.classList.remove('hidden');
                title.innerText = 'Create Account';
                subtitle.innerText = 'Start growing your business with AI';
                toggleText.innerText = 'Already have an account?';
                toggleBtn.innerText = 'Sign in';
            } else {
                // Switch to Login
                registerSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Please sign in to your business account';
                toggleText.innerText = "Don't have an account?";
                toggleBtn.innerText = 'Create one';
            }
        });
    </script>
</body>
</html>
